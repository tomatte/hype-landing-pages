server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Static landing files (serve directly)
    location /landings/ {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # SPA fallback for landing-center hub
    location / {
        try_files $uri $uri/ /index.html;
    }
}
